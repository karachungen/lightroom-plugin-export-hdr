name: Release Lightroom plugin (macOS + Windows)

on:
  push:
    branches: [main, master]
    paths:
      - "ExportHDR.lrplugin/**"
      - "tools/uhdr_repack/**"
      - "scripts/build_plugin.sh"
      - "scripts/build_plugin.ps1"
      - "scripts/package_plugin.sh"
      - "scripts/parse_plugin_version.sh"
      - "scripts/bundle_uhdr_for_plugin.sh"
      - "scripts/bundle_uhdr_for_plugin_windows.ps1"
      - "scripts/run_uhdr_test.sh"
      - "scripts/windows_build_common.ps1"
      - "scripts/setup_windows_build.ps1"
  workflow_dispatch:

concurrency:
  group: release-plugin
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-arm64
            runner: macos-26
            artifact: ExportHDR.lrplugin-macos-arm64.zip
          - id: windows-x64
            runner: windows-latest
            artifact: ExportHDR.lrplugin-windows-x64.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies (macOS)
        if: matrix.id == 'macos-arm64'
        shell: bash
        run: bash scripts/build_plugin.sh install-deps

      - name: Setup CMake 3.31 (Windows)
        if: matrix.id == 'windows-x64'
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "3.31.6"

      - name: Setup MSVC (Windows)
        if: matrix.id == 'windows-x64'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build, test, and package plugin
        shell: bash
        run: bash scripts/build_plugin.sh all

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version from Info.lua
        id: ver
        run: bash scripts/parse_plugin_version.sh --github-output

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Ultra HDR Export v${{ steps.ver.outputs.semver }}
          body: |
            ## 🎉 Ultra HDR Export v${{ steps.ver.outputs.semver }}

            ### ✨ Highlights
            - 🪟 **Windows x64** — full plug-in + `uhdr_repack.exe` (WIC loader, colocated DLLs)
            - ✂️ **Slice images** — optional `1:1` or `4:5` tiles; keeps the master Ultra HDR file and writes numbered slices beside it

            **Platforms:** separate plug-in archives per OS (no mixed binaries).

            | Platform | Archive |
            |----------|---------|
            | macOS 26 (Tahoe), ARM64 | `ExportHDR.lrplugin-macos-arm64.zip` |
            | Windows x64 | `ExportHDR.lrplugin-windows-x64.zip` |

            **Lightroom:** Classic **14+** (`LrSdkMinimumVersion` in `Info.lua`).

            **Install:** unzip the archive for your OS, then in Lightroom **File → Plug-in Manager → Add** and select the `ExportHDR.lrplugin` folder.

            **Commit:** [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})  
            **Workflow run:** [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: |
            release-assets/ExportHDR.lrplugin-macos-arm64.zip
            release-assets/ExportHDR.lrplugin-windows-x64.zip
          fail_on_unmatched_files: true
          generate_release_notes: false
