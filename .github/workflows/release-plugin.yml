name: Release Lightroom plugin (macOS + Windows)

on:
  push:
    branches: [main, master]
    paths:
      - "ExportHDR.lrplugin/**"
      - "tools/uhdr_repack/**"
      - "scripts/bundle_uhdr_for_plugin.sh"
      - "scripts/bundle_uhdr_for_plugin_windows.ps1"
  workflow_dispatch:

concurrency:
  group: release-plugin
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-arm64
            runner: macos-26
            artifact: ExportHDR.lrplugin-macos-arm64.zip
          - id: windows-x64
            runner: windows-latest
            artifact: ExportHDR.lrplugin-windows-x64.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version from Info.lua
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          line=$(grep 'VERSION = {' ExportHDR.lrplugin/Info.lua)
          major=$(echo "$line" | sed -E 's/.*major *= *([0-9]+).*/\1/')
          minor=$(echo "$line" | sed -E 's/.*minor *= *([0-9]+).*/\1/')
          revision=$(echo "$line" | sed -E 's/.*revision *= *([0-9]+).*/\1/')
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"
          tag="v${major}.${minor}.${revision}-r${GITHUB_RUN_NUMBER}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "semver=${major}.${minor}.${revision}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies (macOS)
        if: matrix.id == 'macos-arm64'
        run: brew install cmake jpeg-turbo dylibbundler

      - name: Setup CMake 3.31 (Windows)
        if: matrix.id == 'windows-x64'
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "3.31.6"

      - name: Bundle uhdr_repack into plugin (macOS)
        if: matrix.id == 'macos-arm64'
        run: ./scripts/bundle_uhdr_for_plugin.sh

      - name: Verify arm64 binary (macOS)
        if: matrix.id == 'macos-arm64'
        run: |
          set -euo pipefail
          file ExportHDR.lrplugin/bin/uhdr_repack
          file ExportHDR.lrplugin/bin/uhdr_repack | grep -q arm64

      - name: Bundle uhdr_repack into plugin (Windows)
        if: matrix.id == 'windows-x64'
        shell: pwsh
        run: ./scripts/bundle_uhdr_for_plugin_windows.ps1

      - name: Verify x64 binary (Windows)
        if: matrix.id == 'windows-x64'
        shell: pwsh
        run: |
          if (-not (Test-Path ExportHDR.lrplugin/bin/uhdr_repack.exe)) { throw "missing uhdr_repack.exe" }

      - name: Smoke test encoder (Windows)
        if: matrix.id == 'windows-x64'
        shell: pwsh
        run: ./scripts/run_uhdr_test.ps1

      - name: Create zip (macOS)
        if: matrix.id == 'macos-arm64'
        run: |
          rm -f ExportHDR.lrplugin/bin/uhdr_repack.exe
          rm -f ExportHDR.lrplugin/bin/*.dll
          zip -r ExportHDR.lrplugin-macos-arm64.zip ExportHDR.lrplugin \
            -x "ExportHDR.lrplugin/bin/.gitignore" \
            -x "ExportHDR.lrplugin/bin/README.txt"

      - name: Create zip (Windows)
        if: matrix.id == 'windows-x64'
        shell: pwsh
        run: |
          if (Test-Path ExportHDR.lrplugin/bin/uhdr_repack) { Remove-Item ExportHDR.lrplugin/bin/uhdr_repack -Force }
          Get-ChildItem ExportHDR.lrplugin/bin -Filter *.dylib -ErrorAction SilentlyContinue | Remove-Item -Force
          Compress-Archive -Path ExportHDR.lrplugin -DestinationPath ExportHDR.lrplugin-windows-x64.zip -Force

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version from Info.lua
        id: ver
        run: |
          set -euo pipefail
          line=$(grep 'VERSION = {' ExportHDR.lrplugin/Info.lua)
          major=$(echo "$line" | sed -E 's/.*major *= *([0-9]+).*/\1/')
          minor=$(echo "$line" | sed -E 's/.*minor *= *([0-9]+).*/\1/')
          revision=$(echo "$line" | sed -E 's/.*revision *= *([0-9]+).*/\1/')
          tag="v${major}.${minor}.${revision}-r${GITHUB_RUN_NUMBER}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "semver=${major}.${minor}.${revision}" >> "$GITHUB_OUTPUT"

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Ultra HDR Export v${{ steps.ver.outputs.semver }} (build ${{ github.run_number }})
          body: |
            **Platforms:** separate plug-in archives per OS (no mixed binaries).

            | Platform | Archive |
            |----------|---------|
            | macOS 26 (Tahoe), ARM64 | `ExportHDR.lrplugin-macos-arm64.zip` |
            | Windows x64 | `ExportHDR.lrplugin-windows-x64.zip` |

            **Lightroom:** Classic **14+** (`LrSdkMinimumVersion` in `Info.lua`).

            **Install:** unzip the archive for your OS, then in Lightroom **File → Plug-in Manager → Add** and select the `ExportHDR.lrplugin` folder.

            **Commit:** [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})  
            **Workflow run:** [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: |
            release-assets/ExportHDR.lrplugin-macos-arm64.zip
            release-assets/ExportHDR.lrplugin-windows-x64.zip
          fail_on_unmatched_files: true
          generate_release_notes: false
